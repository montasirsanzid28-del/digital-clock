<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clocks</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Local Time Clock -->
    <div id="clock">
        <h1></h1>
    </div>

    <!-- Digital Local Clock -->
    <div id="digitalclock">
        <h2></h2>
    </div>

    <!-- Dubai Clock -->
    <div id="dubai-clock" class="city-clock">
        <h3>Dubai <span>GMT+4</span></h3>
        <p class="dubai-digital">Gulf Standard Time</p>
    </div>

    <!-- New York Clock -->
    <div id="newyork-clock" class="city-clock">
        <h3>New York <span>GMT-4/-5</span></h3>
        <p class="newyork-digital">Eastern Time</p>
    </div>

    <script src="./script.js"></script>
</body>
</html>
